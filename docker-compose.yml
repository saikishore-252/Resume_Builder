version: "3.9"

services:
  backend:
    build:
      context: ./server
    container_name: mern-backend
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./client
    container_name: mern-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BASE_URL: http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped